<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아스키 아트 및 잔상 상호작용</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="asciiCanvas"></canvas>

<script>
    const canvas = document.getElementById('asciiCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let mouse = { x: -1000, y: -1000 };
    let grid = [];

    // 설정 값
    const spacing = 20; // 격자 간격
    const fontSize = 30; // 폰트 크기
    const mouseRadius = 200; // 마우스에 반응하는 반경
    const reactionSpeed = 0.3;  // 마우스 접근 시 반응 속도 (클수록 빠름, 최대 1)
    const recoverySpeed = 0.01; // 마우스가 멀어졌을 때 복구 속도 (작을수록 잔상이 오래 남음)

    // 밀도를 표현할 문자 배열 (왼쪽: 어두움, 오른쪽: 밝음)
    const densityChars = ['█', '▓', '▒', '░', '=', '+', '-', '.', ' '];

    // 화면 크기에 맞게 캔버스와 격자 초기화
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 격자 데이터 생성
        const cols = Math.ceil(width / spacing);
        const rows = Math.ceil(height / spacing);
        
        grid = [];
        for (let i = 0; i < cols; i++) {
            grid[i] = [];
            for (let j = 0; j < rows; j++) {
                grid[i][j] = {
                    x: i * spacing + spacing / 2,
                    y: j * spacing + spacing / 2,
                    value: 0 // 0: 가장 어두운 상태(기본), 1: 가장 밝은 상태
                };
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    // 마우스 위치 추적
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
    });

    function draw() {
        // 배경을 흰색으로 초기화
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#a9d2c3';

        const cols = grid.length;
        const rows = grid[0].length;

        for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
                let cell = grid[i][j];

                // 마우스와 현재 격자 사이의 거리 계산
                const dx = mouse.x - cell.x;
                const dy = mouse.y - cell.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 거리에 따른 목표 상태값 설정 (0 ~ 1)
                let targetValue = 0;
                if (distance < mouseRadius) {
                    targetValue = 1 - (distance / mouseRadius);
                }

                // 현재 상태값을 목표 상태값으로 서서히 이동 (속도 차이로 잔상 구현)
                if (targetValue > cell.value) {
                    // 마우스가 가까워져 밝아져야 할 때 (빠른 반응)
                    cell.value += (targetValue - cell.value) * reactionSpeed;
                } else {
                    // 마우스가 멀어져 다시 어두워져야 할 때 (느린 복구 = 잔상)
                    cell.value += (targetValue - cell.value) * recoverySpeed;
                }

                // 현재 값을 문자 배열의 인덱스로 변환
                let charIndex = Math.floor(cell.value * (densityChars.length - 1));
                
                // 인덱스 범위 초과 방지
                if (charIndex < 0) charIndex = 0;
                if (charIndex >= densityChars.length) charIndex = densityChars.length - 1;

                // 텍스트 그리기
                ctx.fillText(densityChars[charIndex], cell.x, cell.y);
            }
        }

        requestAnimationFrame(draw);
    }

    // 그리기 시작
    draw();
</script>

</body>
</html>
