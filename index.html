<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아스키 아트 및 파티클 상호작용</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="asciiCanvas"></canvas>

<script>
    const canvas = document.getElementById('asciiCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let mouse = { x: -1000, y: -1000 };
    let grid = [];
    let particles = []; // 파티클 데이터를 저장할 배열

    // 설정 값
    const spacing = 20; // 격자 간격
    const fontSize = 30; // 폰트 크기
    const mouseRadius = 200; // 마우스에 반응하는 반경
    const reactionSpeed = 0.3;  // 마우스 접근 시 반응 속도
    const recoverySpeed = 0.01; // 상태 복구 속도 (잔상 효과)

    // 밀도를 표현할 문자 배열
    const densityChars = ['█', '▓', '▒', '░', '=', '+', '-', '.', ' '];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const cols = Math.ceil(width / spacing);
        const rows = Math.ceil(height / spacing);
        
        grid = [];
        for (let i = 0; i < cols; i++) {
            grid[i] = [];
            for (let j = 0; j < rows; j++) {
                grid[i][j] = {
                    x: i * spacing + spacing / 2,
                    y: j * spacing + spacing / 2,
                    value: 0
                };
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
        mouse.x = -1000;
        mouse.y = -1000;
    });

    // 클릭 이벤트 추가
    window.addEventListener('click', (e) => {
    const numParticles = 70; // 파티클 개수 (크지 않게 유지)
    
    for (let i = 0; i < numParticles; i++) {
        const angle = Math.random() * Math.PI * 2;
        
        // 속도는 매우 빠르지만 수명(life)을 짧게 설정하여 반경을 제한함
        const speed = Math.random() * 20 + 50; 
        
        particles.push({
            x: e.clientX,
            y: e.clientY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            // 수명을 2~5 프레임 내외로 짧게 설정하여 멀리 가지 못하게 함
            life: Math.random() * 3 + 3, 
            // 감속 계수 추가 (매 프레임마다 속도를 줄임)
            friction: 0.7 
        });
    }
});

    function draw() {
        ctx.fillStyle = '#555';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#111';

        const cols = grid.length;
        const rows = grid[0].length;

        // 파티클 상태 갱신 및 격자에 반영
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;

            // 파티클의 현재 위치를 격자 인덱스로 변환
            let col = Math.floor(p.x / spacing);
            let row = Math.floor(p.y / spacing);

            // 화면 범위 내의 격자인 경우 상태 값을 1(가장 밝은 상태)로 고정
            if (col >= 0 && col < cols && row >= 0 && row < rows) {
                grid[col][row].value = 1;
            }

            // 수명이 다한 파티클 제거
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
                let cell = grid[i][j];

                const dx = mouse.x - cell.x;
                const dy = mouse.y - cell.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                let targetValue = 0;
                if (distance < mouseRadius) {
                    targetValue = 1 - (distance / mouseRadius);
                }

                if (targetValue > cell.value) {
                    cell.value += (targetValue - cell.value) * reactionSpeed;
                } else {
                    cell.value += (targetValue - cell.value) * recoverySpeed;
                }

                let charIndex = Math.floor(cell.value * (densityChars.length - 1));
                
                if (charIndex < 0) charIndex = 0;
                if (charIndex >= densityChars.length) charIndex = densityChars.length - 1;

                ctx.fillText(densityChars[charIndex], cell.x, cell.y);
            }
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>

</body>
</html>
