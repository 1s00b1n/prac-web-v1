<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아스키 아트 및 시선 추적 (비디오)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
        }
        canvas {
            display: block;
        }
        #videoElement {
            display: none;
        }
    </style>
</head>
<body>

<video id="videoElement" src="video.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
<canvas id="asciiCanvas"></canvas>

<script>
    const canvas = document.getElementById('asciiCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');

    let width, height;
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let skinGrid = [];

    const spacing = 10;
    const fontSize = 13;

    const densityChars = ['█', '▓', '▒', '░', '*', '+', '=', '-', '.', ' ', ' '];
    
    const eyeBaseRadius = 250;
    const irisRadius = 115;
    const pupilRadius = 50;

    let offCanvas = document.createElement('canvas');
    let offCtx = offCanvas.getContext('2d');

    // 비디오 강제 재생 후 그리기 시작
        video.play().then(() => {
            draw();
        }).catch((error) => {
            console.error("비디오 재생이 차단되었습니다:", error);
            // 브라우저 정책으로 재생이 막힌 경우, 화면 클릭 시 재생되도록 이벤트 추가
            window.addEventListener('click', () => {
                video.play();
                draw();
            }, { once: true });
        });

    // 비디오의 메타데이터(너비, 높이 등)가 로드되면 초기화를 시작합니다.
    video.addEventListener('loadedmetadata', init);

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        draw();
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        offCanvas.width = width;
        offCanvas.height = height;

        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
    }

    // 매 프레임마다 비디오 화면을 읽어 명도를 계산하는 함수
    function updateGrid() {
        const videoRatio = video.videoWidth / video.videoHeight;
        const canvasRatio = width / height;
        let drawWidth, drawHeight, offsetX, offsetY;

        if (canvasRatio > videoRatio) {
            drawWidth = width;
            drawHeight = width / videoRatio;
            offsetX = 0;
            offsetY = (height - drawHeight) / 2;
        } else {
            drawHeight = height;
            drawWidth = height * videoRatio;
            offsetX = (width - drawWidth) / 2;
            offsetY = 0;
        }

        offCtx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
        const imageData = offCtx.getImageData(0, 0, width, height).data;

        const cols = Math.ceil(width / spacing);
        const rows = Math.ceil(height / spacing);
        
        skinGrid = [];
        for (let i = 0; i < cols; i++) {
            skinGrid[i] = [];
            for (let j = 0; j < rows; j++) {
                let x = i * spacing + spacing / 2;
                let y = j * spacing + spacing / 2;

                const pixelX = Math.floor(x);
                const pixelY = Math.floor(y);
                
                // 캔버스 범위를 벗어나는 픽셀 제외
                if(pixelX >= width || pixelY >= height) continue;

                const index = (pixelY * width + pixelX) * 4;

                const r = imageData[index];
                const g = imageData[index + 1];
                const b = imageData[index + 2];
                const a = imageData[index + 3];

                let brightness = 0;
                let isSkin = false;

                if (a > 128) { 
                    brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    isSkin = true;
                }

                skinGrid[i][j] = {
                    x: x,
                    y: y,
                    brightness: brightness,
                    isSkin: isSkin
                };
            }
        }
    }

    function draw() {
        // 비디오 데이터가 재생 가능한 상태일 때만 그리드 갱신
        if (video.readyState >= video.HAVE_CURRENT_DATA) {
            updateGrid();
        }

        ctx.fillStyle = '#cccccc';
        ctx.fillRect(0, 0, width, height);

        const cols = skinGrid.length;
        if (cols > 0) {
            const rows = skinGrid[0].length;

            const eyeCenterX = width * 0.60;
            const eyeCenterY = height * 0.52;

            const mouseDx = mouse.x - eyeCenterX;
            const mouseDy = mouse.y - eyeCenterY;

            const maxMove = 50;
            const angle = Math.atan2(mouseDy, mouseDx);
            const distance = Math.min(Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy) * 0.1, maxMove);
            
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    let cell = skinGrid[i][j];
                    if (!cell) continue;

                    if (cell.isSkin) {
                        let charIndex = Math.floor(cell.brightness * (densityChars.length - 1));
                        if (charIndex < 0) charIndex = 0;
                        if (charIndex >= densityChars.length) charIndex = densityChars.length - 1;

                        ctx.fillStyle = '#000000';
                        ctx.fillText(densityChars[charIndex], cell.x, cell.y);
                    }
                }
            }
        }

        requestAnimationFrame(draw);
    }
</script>

</body>
</html>
