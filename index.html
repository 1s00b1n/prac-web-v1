<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아스키 아트 및 시선 추적 (합성)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="asciiCanvas"></canvas>

<script>
    const canvas = document.getElementById('asciiCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let skinGrid = [];

    const spacing = 12; // 격자 간격
    const fontSize = 12; // 폰트 크기

    // 명도를 표현할 문자 배열
    const densityChars = [' ', ' ', '.', ':', '-', '=', '+', '*', '#', '%', '@'];
    
    // 원형 눈동자 크기 설정
    const eyeBaseRadius = 180; // 흰자위가 표시될 최대 반경
    const irisRadius = 70;     // 홍채 반경
    const pupilRadius = 25;    // 동공 반경
    
    const img = new Image();
    // 주의: 배경이 투명하게 처리된 PNG 파일의 경로를 입력해야 합니다.
    img.src = 'eye-image.png'; 
    img.crossOrigin = "Anonymous";

    img.onload = () => {
        init();
    };

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        draw();
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');
        offCanvas.width = width;
        offCanvas.height = height;

        const imgRatio = img.width / img.height;
        const canvasRatio = width / height;
        let drawWidth, drawHeight, offsetX, offsetY;

        if (canvasRatio > imgRatio) {
            drawWidth = width;
            drawHeight = width / imgRatio;
            offsetX = 0;
            offsetY = (height - drawHeight) / 2;
        } else {
            drawHeight = height;
            drawWidth = height * imgRatio;
            offsetX = (width - drawWidth) / 2;
            offsetY = 0;
        }

        offCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        const imageData = offCtx.getImageData(0, 0, width, height).data;

        const cols = Math.ceil(width / spacing);
        const rows = Math.ceil(height / spacing);
        
        skinGrid = [];
        for (let i = 0; i < cols; i++) {
            skinGrid[i] = [];
            for (let j = 0; j < rows; j++) {
                let x = i * spacing + spacing / 2;
                let y = j * spacing + spacing / 2;

                const pixelX = Math.floor(x);
                const pixelY = Math.floor(y);
                const index = (pixelY * width + pixelX) * 4;

                const r = imageData[index];
                const g = imageData[index + 1];
                const b = imageData[index + 2];
                const a = imageData[index + 3]; // 투명도(Alpha) 값 추출

                let brightness = 0;
                let isSkin = false;

                // 알파 값이 일정 수준 이상인 픽셀만 바탕 이미지로 인식
                if (a > 128) { 
                    brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    isSkin = true;
                }

                skinGrid[i][j] = {
                    x: x,
                    y: y,
                    brightness: brightness,
                    isSkin: isSkin
                };
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

        const cols = skinGrid.length;
        const rows = skinGrid[0].length;

        // 화면 중앙을 눈의 기본 중심으로 설정
        const eyeCenterX = width / 2;
        const eyeCenterY = height / 2;

        const mouseDx = mouse.x - eyeCenterX;
        const mouseDy = mouse.y - eyeCenterY;

        // 눈동자의 최대 이동 거리 제한
        const maxMove = 50;
        const angle = Math.atan2(mouseDy, mouseDx);
        const distance = Math.min(Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy) * 0.1, maxMove);
        
        const moveX = Math.cos(angle) * distance;
        const moveY = Math.sin(angle) * distance;

        for (let i = 0; i < cols; i++) {
            for (let j = 0; j < rows; j++) {
                let cell = skinGrid[i][j];

                if (cell.isSkin) {
                    // 바탕 이미지(피부) 영역 출력
                    let charIndex = Math.floor(cell.brightness * (densityChars.length - 1));
                    if (charIndex < 0) charIndex = 0;
                    if (charIndex >= densityChars.length) charIndex = densityChars.length - 1;

                    ctx.fillStyle = '#cccccc';
                    ctx.fillText(densityChars[charIndex], cell.x, cell.y);
                } else {
                    // 투명한 영역에 절차적으로 생성된 눈동자 출력
                    let dx = cell.x - eyeCenterX;
                    let dy = cell.y - eyeCenterY;
                    let distToCenter = Math.sqrt(dx * dx + dy * dy);

                    if (distToCenter < eyeBaseRadius) {
                        
                        // 마우스 위치에 따른 동공 중심 연산
                        let dxEye = cell.x - (eyeCenterX + moveX);
                        let dyEye = cell.y - (eyeCenterY + moveY);
                        let distToEye = Math.sqrt(dxEye * dxEye + dyEye * dyEye);

                        let charToDraw = '.'; // 기본 흰자위 문자
                        ctx.fillStyle = '#666666'; 

                        if (distToEye < pupilRadius) {
                            charToDraw = '@';
                            ctx.fillStyle = '#4488ff'; // 동공 색상
                        } else if (distToEye < irisRadius) {
                            charToDraw = '#';
                            ctx.fillStyle = '#999999'; // 홍채 색상
                        }

                        ctx.fillText(charToDraw, cell.x, cell.y);
                    }
                }
            }
        }

        requestAnimationFrame(draw);
    }
</script>

</body>
</html>
